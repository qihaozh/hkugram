services:
  db:
    image: mysql:8.4
    container_name: hkugram-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hkugram
      MYSQL_USER: hkugram
      MYSQL_PASSWORD: hkugram
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: hkugram-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: hkugram-backend
    restart: unless-stopped
    environment:
      APP_NAME: HKUgram API
      DATABASE_URL: mysql+pymysql://hkugram:hkugram@db:3306/hkugram
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://gudufree.yeelam.site/v1}
      AI_MODEL: ${AI_MODEL:-llama3.1-8b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-90}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: node:22.12-alpine
    container_name: hkugram-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
