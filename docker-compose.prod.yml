services:
  db:
    image: mysql:8.4
    container_name: hkugram-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hkugram
      MYSQL_USER: hkugram
      MYSQL_PASSWORD: hkugram
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4.8.1
    container_name: hkugram-adminer
    restart: unless-stopped
    ports:
      - "8070:8080"
    depends_on:
      db:
        condition: service_healthy

  backend:
    image: ghcr.xiaoji.de/bylinmou/hkugram-backend:latest
    container_name: hkugram-backend
    restart: unless-stopped
    environment:
      APP_NAME: HKUgram API
      DATABASE_URL: mysql+pymysql://hkugram:hkugram@db:3306/hkugram
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://gudufree.yeelam.site/v1}
      AI_MODEL: ${AI_MODEL:-llama3.1-8b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-90}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: ghcr.xiaoji.de/bylinmou/hkugram-frontend:latest
    container_name: hkugram-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
